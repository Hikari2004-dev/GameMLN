<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>OpenRPG</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#mobile-space-btn {
	position: fixed;
	right: 1rem;
	bottom: calc(1rem + env(safe-area-inset-bottom, 0px));
	width: 5.5rem;
	height: 5.5rem;
	border: 2px solid rgba(255, 255, 255, 0.5);
	border-radius: 999px;
	background: rgba(20, 20, 20, 0.35);
	color: #fff;
	font-size: 1rem;
	font-weight: 700;
	letter-spacing: 0.06em;
	backdrop-filter: blur(4px);
	-webkit-backdrop-filter: blur(4px);
	touch-action: none;
	user-select: none;
	-webkit-user-select: none;
	z-index: 10;
	display: none;
}

#mobile-space-btn.is-active {
	transform: scale(0.96);
	background: rgba(255, 255, 255, 0.2);
	border-color: rgba(255, 255, 255, 0.8);
}

@media (hover: none) and (pointer: coarse) {
	#mobile-space-btn {
		display: block;
	}
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="gamemln.icon.png" />
<link rel="apple-touch-icon" href="gamemln.apple-touch-icon.png"/>

	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="gamemln.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<button id="mobile-space-btn" type="button" aria-label="Space">SPACE</button>

		<script src="gamemln.js"></script>
		<script>
const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"gamemln","experimentalVK":false,"fileSizes":{"gamemln.pck":15463588,"gamemln.wasm":35754592},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	const mobileSpaceBtn = document.getElementById('mobile-space-btn');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	let mobileSpacePressed = false;
	function dispatchSpaceEvent(type) {
		const keyboardEvent = new KeyboardEvent(type, {
			key: ' ',
			code: 'Space',
			keyCode: 32,
			which: 32,
			bubbles: true,
			cancelable: true,
		});
		document.dispatchEvent(keyboardEvent);
		window.dispatchEvent(keyboardEvent);
		const canvas = document.getElementById('canvas');
		if (canvas) {
			canvas.dispatchEvent(keyboardEvent);
		}
	}

	if (mobileSpaceBtn) {
		mobileSpaceBtn.addEventListener('contextmenu', function (event) {
			event.preventDefault();
		});

		mobileSpaceBtn.addEventListener('pointerdown', function (event) {
			event.preventDefault();
			if (mobileSpacePressed) {
				return;
			}
			mobileSpacePressed = true;
			mobileSpaceBtn.classList.add('is-active');
			dispatchSpaceEvent('keydown');
		});

		const releaseMobileSpace = function (event) {
			event.preventDefault();
			if (!mobileSpacePressed) {
				return;
			}
			mobileSpacePressed = false;
			mobileSpaceBtn.classList.remove('is-active');
			dispatchSpaceEvent('keyup');
		};

		mobileSpaceBtn.addEventListener('pointerup', releaseMobileSpace);
		mobileSpaceBtn.addEventListener('pointercancel', releaseMobileSpace);
		mobileSpaceBtn.addEventListener('pointerleave', releaseMobileSpace);
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
